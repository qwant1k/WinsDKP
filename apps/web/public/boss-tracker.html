<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Клановый трекер боссов — Legend of Ymir</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0f;
    --surface: #11131a;
    --surface2: #181b24;
    --border: #2a2d3a;
    --gold: #c8a84b;
    --gold-dim: #7a6229;
    --red: #c84b4b;
    --green: #4bc87a;
    --text: #e8e0cc;
    --text-dim: #6b6456;
    --glow: rgba(200, 168, 75, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    background-image: 
      radial-gradient(ellipse at 20% 0%, rgba(200,168,75,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(200,75,75,0.04) 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  header {
    text-align: center;
    padding: 48px 24px 32px;
    position: relative;
  }

  .header-rune {
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--gold-dim);
    font-family: 'Cinzel', serif;
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: clamp(28px, 5vw, 52px);
    color: var(--gold);
    text-shadow: 0 0 40px rgba(200,168,75,0.4), 0 2px 0 rgba(0,0,0,0.8);
    letter-spacing: 3px;
    line-height: 1.1;
  }

  .subtitle {
    font-size: 14px;
    color: var(--text-dim);
    margin-top: 8px;
    letter-spacing: 2px;
    font-style: italic;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    max-width: 600px;
    margin: 24px auto 0;
    opacity: 0.4;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold));
  }
  .divider::after { background: linear-gradient(to left, transparent, var(--gold)); }
  .divider-icon { color: var(--gold); font-size: 18px; }

  .container { max-width: 1000px; margin: 0 auto; padding: 0 20px 60px; }

  /* Add boss button */
  .top-bar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 20px;
  }

  .btn-add {
    background: linear-gradient(135deg, #1a1c26, #252836);
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 2px;
    padding: 10px 24px;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
  }
  .btn-add::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--glow);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn-add:hover { border-color: var(--gold); color: #e8c96a; }
  .btn-add:hover::before { opacity: 1; }

  /* Boss table */
  .boss-list { display: flex; flex-direction: column; gap: 8px; }

  .boss-row {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 160px 160px 160px auto;
    align-items: center;
    gap: 0;
    transition: border-color 0.3s, opacity 0.3s;
    overflow: hidden;
  }

  .boss-row:hover { border-color: #3a3d50; }

  .boss-row.dead { opacity: 0.55; }

  .boss-cell {
    padding: 16px 20px;
    border-right: 1px solid var(--border);
    position: relative;
    z-index: 1;
  }
  .boss-cell:last-child { border-right: none; }

  .boss-name {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    color: var(--text);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .boss-skull { font-size: 18px; opacity: 0.7; }

  .boss-location {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    font-style: italic;
    letter-spacing: 0.5px;
  }

  .label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 4px;
    font-family: 'Cinzel', serif;
  }

  .respawn-time {
    font-size: 20px;
    font-family: 'Cinzel', serif;
    color: var(--gold);
    letter-spacing: 1px;
  }

  .status-cell { text-align: center; padding: 16px 12px; }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    letter-spacing: 1.5px;
    font-family: 'Cinzel', serif;
    text-transform: uppercase;
    padding: 5px 12px;
  }

  .status-badge.alive {
    color: var(--green);
    background: rgba(75, 200, 122, 0.08);
    border: 1px solid rgba(75, 200, 122, 0.3);
  }
  .status-badge.dead-badge {
    color: var(--red);
    background: rgba(200, 75, 75, 0.08);
    border: 1px solid rgba(200, 75, 75, 0.3);
  }

  .dot { width: 6px; height: 6px; border-radius: 50%; }
  .dot.green { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse-green 2s infinite; }
  .dot.red { background: var(--red); }

  @keyframes pulse-green {
    0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
  }

  .timer-display {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    color: #e8745a;
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(232, 116, 90, 0.5);
  }

  /* Kill button */
  .btn-kill {
    background: linear-gradient(135deg, rgba(75,200,122,0.1), rgba(75,200,122,0.05));
    border: 1px solid rgba(75, 200, 122, 0.4);
    color: var(--green);
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 9px 16px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.25s;
    white-space: nowrap;
  }
  .btn-kill:hover {
    background: rgba(75,200,122,0.2);
    border-color: var(--green);
    box-shadow: 0 0 20px rgba(75,200,122,0.2);
  }

  .btn-reset {
    background: linear-gradient(135deg, rgba(200,75,75,0.1), rgba(200,75,75,0.05));
    border: 1px solid rgba(200,75,75,0.3);
    color: #e08080;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 9px 16px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.25s;
    white-space: nowrap;
  }
  .btn-reset:hover { background: rgba(200,75,75,0.2); border-color: var(--red); }

  /* Timer overlay */
  .timer-overlay {
    position: absolute;
    inset: 0;
    background: rgba(10, 11, 15, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    backdrop-filter: blur(1px);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
  }
  .boss-row.dead .timer-overlay { opacity: 1; pointer-events: none; }

  .timer-big {
    font-family: 'Cinzel', serif;
    font-size: clamp(20px, 3vw, 32px);
    color: #e8a87a;
    letter-spacing: 4px;
    text-shadow: 0 0 30px rgba(232, 168, 122, 0.6);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .timer-label-big {
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(232,168,122,0.6);
    text-transform: uppercase;
    font-family: 'Cinzel', serif;
    margin-top: 4px;
    text-align: center;
  }

  .timer-block { text-align: center; }
  .timer-sep { color: rgba(232,168,122,0.4); font-size: 24px; margin-top: -8px; }

  /* Table header */
  .boss-header {
    display: grid;
    grid-template-columns: 1fr 160px 160px 160px auto;
    padding: 0;
    margin-bottom: 4px;
  }
  .boss-header-cell {
    padding: 8px 20px;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    font-family: 'Cinzel', serif;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--gold-dim);
    width: 100%;
    max-width: 480px;
    padding: 40px;
    position: relative;
    transform: translateY(20px);
    transition: transform 0.3s;
    box-shadow: 0 0 80px rgba(200,168,75,0.1);
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-title {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 32px;
    text-align: center;
  }

  .form-group { margin-bottom: 20px; }
  .form-label {
    display: block;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    font-family: 'Cinzel', serif;
    margin-bottom: 8px;
  }
  .form-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 16px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--gold-dim); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  .modal-actions {
    display: flex;
    gap: 12px;
    margin-top: 32px;
  }

  .btn-submit {
    flex: 1;
    background: linear-gradient(135deg, rgba(200,168,75,0.2), rgba(200,168,75,0.08));
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 2px;
    padding: 12px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.25s;
  }
  .btn-submit:hover { background: rgba(200,168,75,0.25); border-color: var(--gold); }

  .btn-cancel {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 2px;
    padding: 12px 24px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.25s;
  }
  .btn-cancel:hover { border-color: #4a4d5a; color: var(--text); }

  /* Emoji picker */
  .emoji-picker-btn {
    width: 56px;
    height: 56px;
    background: var(--bg);
    border: 1px solid var(--border);
    font-size: 28px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s;
    flex-shrink: 0;
  }
  .emoji-picker-btn:hover { border-color: var(--gold-dim); }

  .emoji-field-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }
  .emoji-field-row .form-group { flex: 1; margin-bottom: 0; }

  .emoji-grid-popup {
    position: absolute;
    background: var(--surface2);
    border: 1px solid var(--border);
    box-shadow: 0 8px 40px rgba(0,0,0,0.7);
    padding: 12px;
    display: grid;
    grid-template-columns: repeat(8, 36px);
    gap: 4px;
    z-index: 200;
    top: calc(100% + 6px);
    left: 0;
    display: none;
  }
  .emoji-grid-popup.show { display: grid; }

  .emoji-option {
    width: 36px;
    height: 36px;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.15s;
    border: 1px solid transparent;
  }
  .emoji-option:hover { background: rgba(200,168,75,0.1); border-color: var(--gold-dim); }
  .emoji-option.selected { background: rgba(200,168,75,0.2); border-color: var(--gold); }

  /* Notification */
  .notif-container {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .notif {
    background: var(--surface2);
    border: 1px solid var(--green);
    border-left: 3px solid var(--green);
    padding: 14px 20px;
    max-width: 320px;
    box-shadow: 0 0 30px rgba(75,200,122,0.15);
    animation: slideIn 0.4s ease, fadeOut 0.4s ease 3.6s forwards;
    font-size: 14px;
    line-height: 1.5;
  }

  .notif-title {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--green);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  @keyframes slideIn {
    from { transform: translateX(40px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  @keyframes fadeOut {
    to { transform: translateX(40px); opacity: 0; }
  }

  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-dim);
    border: 1px dashed var(--border);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
  .empty-text { font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 2px; }

  @media (max-width: 700px) {
    .boss-row, .boss-header { grid-template-columns: 1fr auto; }
    .boss-cell:not(:first-child):not(:last-child) { display: none; }
    .boss-header-cell:not(:first-child):not(:last-child) { display: none; }
    .timer-big { font-size: 18px; letter-spacing: 2px; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-rune">⚔ Клан Трекер ⚔</div>
  <h1>Legend of Ymir</h1>
  <div class="subtitle">Журнал боссов — отслеживание респауна</div>
  <div class="divider"><span class="divider-icon">☽</span></div>
</header>

<div class="container">
  <div class="top-bar">
    <button class="btn-add" onclick="openModal()">+ Добавить босса</button>
  </div>

  <div class="boss-header">
    <div class="boss-header-cell">Босс / Локация</div>
    <div class="boss-header-cell">Респаун</div>
    <div class="boss-header-cell">Статус</div>
    <div class="boss-header-cell">Таймер</div>
    <div class="boss-header-cell"></div>
  </div>

  <div class="boss-list" id="bossList"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">⚔ Новый Босс</div>
    <div class="form-group">
      <label class="form-label">Имя босса</label>
      <input class="form-input" id="f-name" type="text" placeholder="Нидхёгг, Страж Бездны...">
    </div>
    <div class="form-group">
      <label class="form-label">Локация</label>
      <input class="form-input" id="f-location" type="text" placeholder="Долина Теней, Пещера Льда...">
    </div>
    <div class="form-group">
      <label class="form-label">Иконка босса</label>
      <div class="emoji-field-row">
        <div style="position:relative;">
          <button type="button" class="emoji-picker-btn" id="emojiBtn" onclick="toggleEmojiPicker()">🐉</button>
          <div class="emoji-grid-popup" id="emojiGrid"></div>
        </div>
        <div style="font-size:13px;color:var(--text-dim);font-style:italic;padding-bottom:8px;">Нажми чтобы выбрать эмодзи</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Время респауна</label>
      <div class="form-row">
        <div>
          <label class="form-label">Часы</label>
          <input class="form-input" id="f-hours" type="number" min="0" max="99" placeholder="0">
        </div>
        <div>
          <label class="form-label">Минуты</label>
          <input class="form-input" id="f-minutes" type="number" min="0" max="59" placeholder="30">
        </div>
        <div>
          <label class="form-label">Секунды</label>
          <input class="form-input" id="f-seconds" type="number" min="0" max="59" placeholder="0">
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-submit" onclick="addBoss()">Добавить босса</button>
    </div>
  </div>
</div>

<div class="notif-container" id="notifContainer"></div>

<script>
  // Default bosses
  let bosses = [
    { id: 1, name: 'Нидхёгг Проклятый', location: 'Корни Иггдрасиля', respawnSeconds: 7200, killedAt: null, emoji: '🐉' },
    { id: 2, name: 'Страж Бездны', location: 'Пещера Льда, Сектор 3', respawnSeconds: 3600, killedAt: null, emoji: '💀' },
    { id: 3, name: 'Йормунганд', location: 'Берег Мёртвого Моря', respawnSeconds: 14400, killedAt: null, emoji: '🐍' },
    { id: 4, name: 'Хримтурс', location: 'Замёрзшие Равнины', respawnSeconds: 1800, killedAt: null, emoji: '❄️' },
  ];

  let nextId = 5;

  function formatRespawn(sec) {
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    if (h > 0) return `${h}ч ${m}м`;
    if (m > 0) return `${m}м ${s > 0 ? s+'с' : ''}`;
    return `${s}с`;
  }

  function getRemaining(boss) {
    if (!boss.killedAt) return null;
    const elapsed = Math.floor((Date.now() - boss.killedAt) / 1000);
    const remaining = boss.respawnSeconds - elapsed;
    return remaining > 0 ? remaining : 0;
  }

  function formatTimer(sec) {
    const h = String(Math.floor(sec / 3600)).padStart(2, '0');
    const m = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
    const s = String(sec % 60).padStart(2, '0');
    return { h, m, s };
  }

  function render() {
    const list = document.getElementById('bossList');
    if (bosses.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">⚔️</div><div class="empty-text">Боссы не добавлены</div></div>`;
      return;
    }
    list.innerHTML = bosses.map(boss => {
      const remaining = getRemaining(boss);
      const isDead = remaining !== null && remaining > 0;
      const t = isDead ? formatTimer(remaining) : null;
      return `
      <div class="boss-row ${isDead ? 'dead' : ''}" id="row-${boss.id}">
        <div class="boss-cell">
          <div class="boss-name"><span class="boss-skull">${boss.emoji}</span>${boss.name}</div>
          <div class="boss-location">📍 ${boss.location}</div>
        </div>
        <div class="boss-cell">
          <div class="label">Респаун</div>
          <div class="respawn-time">${formatRespawn(boss.respawnSeconds)}</div>
        </div>
        <div class="boss-cell status-cell">
          ${isDead
            ? `<span class="status-badge dead-badge"><span class="dot red"></span>Мёртв</span>`
            : `<span class="status-badge alive"><span class="dot green"></span>Живой</span>`
          }
        </div>
        <div class="boss-cell">
          ${isDead
            ? `<div class="label">Осталось</div><div class="timer-display" id="timer-${boss.id}">${t.h}:${t.m}:${t.s}</div>`
            : `<div style="color:var(--text-dim);font-size:13px;font-style:italic;">—</div>`
          }
        </div>
        <div class="boss-cell" style="padding:12px 16px;">
          ${isDead
            ? `<button class="btn-reset" onclick="resetBoss(${boss.id})">Отменить</button>`
            : `<button class="btn-kill" onclick="killBoss(${boss.id})">☠ Убит</button>`
          }
        </div>

        ${isDead ? `
        <div class="timer-overlay">
          <div>
            <div class="timer-big">
              <div class="timer-block"><span id="ot-h-${boss.id}">${t.h}</span><div style="font-size:9px;letter-spacing:2px;color:rgba(232,168,122,0.4);font-family:'Cinzel',serif;margin-top:2px;">ЧАСЫ</div></div>
              <div class="timer-sep">:</div>
              <div class="timer-block"><span id="ot-m-${boss.id}">${t.m}</span><div style="font-size:9px;letter-spacing:2px;color:rgba(232,168,122,0.4);font-family:'Cinzel',serif;margin-top:2px;">МИН</div></div>
              <div class="timer-sep">:</div>
              <div class="timer-block"><span id="ot-s-${boss.id}">${t.s}</span><div style="font-size:9px;letter-spacing:2px;color:rgba(232,168,122,0.4);font-family:'Cinzel',serif;margin-top:2px;">СЕК</div></div>
            </div>
            <div class="timer-label-big">${boss.name} — Ожидание респауна</div>
          </div>
        </div>` : ''}
      </div>`;
    }).join('');
  }

  function killBoss(id) {
    const boss = bosses.find(b => b.id === id);
    if (!boss) return;
    boss.killedAt = Date.now();
    render();
    showNotif(`☠ ${boss.name} убит!`, `Таймер запущен. Босс возродится через ${formatRespawn(boss.respawnSeconds)}.`, 'dead');
  }

  function resetBoss(id) {
    const boss = bosses.find(b => b.id === id);
    if (!boss) return;
    boss.killedAt = null;
    render();
  }

  // Tick timers
  setInterval(() => {
    bosses.forEach(boss => {
      const remaining = getRemaining(boss);
      if (remaining === null) return;

      if (remaining === 0) {
        // Respawned
        boss.killedAt = null;
        render();
        return;
      }

      const t = formatTimer(remaining);
      const hEl = document.getElementById(`ot-h-${boss.id}`);
      const mEl = document.getElementById(`ot-m-${boss.id}`);
      const sEl = document.getElementById(`ot-s-${boss.id}`);
      const tEl = document.getElementById(`timer-${boss.id}`);
      if (hEl) hEl.textContent = t.h;
      if (mEl) mEl.textContent = t.m;
      if (sEl) sEl.textContent = t.s;
      if (tEl) tEl.textContent = `${t.h}:${t.m}:${t.s}`;
    });
  }, 1000);

  function showNotif(title, text, type) {
    window.parent.postMessage({
      type: 'boss-notification',
      title,
      text,
      kind: type
    }, '*');
    return;

    const c = document.getElementById('notifContainer');
    const el = document.createElement('div');
    el.className = 'notif';
    el.style.borderColor = type === 'alive' ? 'var(--green)' : 'var(--red)';
    el.style.borderLeftColor = type === 'alive' ? 'var(--green)' : 'var(--red)';
    el.innerHTML = `<div class="notif-title" style="color:${type==='alive'?'var(--green)':'var(--red)'}">${title}</div><div>${text}</div>`;
    c.appendChild(el);
    setTimeout(() => el.remove(), 4200);

    // Browser notification
    if (Notification.permission === 'granted') {
      new Notification(title, { body: text, icon: '⚔️' });
    }
  }

  // Modal
  function openModal() {
    document.getElementById('modalOverlay').classList.add('open');
  }
  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.getElementById('f-name').value = '';
    document.getElementById('f-location').value = '';
    document.getElementById('f-hours').value = '';
    document.getElementById('f-minutes').value = '';
    document.getElementById('f-seconds').value = '';
    selectedEmoji = '🐉';
    document.getElementById('emojiBtn').textContent = '🐉';
  }

  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // Emoji picker
  const allEmojis = [
    '🐉','💀','🐍','❄️','🔥','⚡','👁️','🗡️','🛡️','☠️',
    '🦇','🕷️','🦂','🐺','🦁','🐗','🐻','🦅',
    '👹','👺','🤺','⚔️','🏹','🔱','💎','🌑',
    '🌊','🌋','⛰️','🌪️','🌩️','🧿','🔮','💜',
    '🧟','🧛','🧙','🦾','💥','🌀','🩸','⚰️'
  ];

  let selectedEmoji = '🐉';

  function buildEmojiGrid() {
    const grid = document.getElementById('emojiGrid');
    grid.innerHTML = allEmojis.map(e => 
      `<div class="emoji-option ${e === selectedEmoji ? 'selected' : ''}" onclick="selectEmoji('${e}')">${e}</div>`
    ).join('');
  }

  function toggleEmojiPicker() {
    const grid = document.getElementById('emojiGrid');
    buildEmojiGrid();
    grid.classList.toggle('show');
  }

  function selectEmoji(emoji) {
    selectedEmoji = emoji;
    document.getElementById('emojiBtn').textContent = emoji;
    document.getElementById('emojiGrid').classList.remove('show');
  }

  // Close picker when clicking outside
  document.addEventListener('click', function(e) {
    if (!e.target.closest('#emojiBtn') && !e.target.closest('#emojiGrid')) {
      document.getElementById('emojiGrid')?.classList.remove('show');
    }
  });

  function addBoss() {
    const name = document.getElementById('f-name').value.trim();
    const location = document.getElementById('f-location').value.trim();
    const h = parseInt(document.getElementById('f-hours').value) || 0;
    const m = parseInt(document.getElementById('f-minutes').value) || 0;
    const s = parseInt(document.getElementById('f-seconds').value) || 0;
    const totalSeconds = h * 3600 + m * 60 + s;

    if (!name) { alert('Введите имя босса'); return; }
    if (totalSeconds === 0) { alert('Укажите время респауна'); return; }

    bosses.push({
      id: nextId++,
      name,
      location: location || 'Неизвестная локация',
      respawnSeconds: totalSeconds,
      killedAt: null,
      emoji: selectedEmoji
    });

    closeModal();
    render();

    // Request notification permission
    if (Notification.permission === 'default') {
      Notification.requestPermission();
    }
  }

  // External bridge for app integration (state sync, persistence)
  window.__bossTrackerBridge = {
    getState: function() {
      return {
        bosses: JSON.parse(JSON.stringify(bosses)),
        nextId: nextId,
      };
    },
    setState: function(state) {
      if (!state || !Array.isArray(state.bosses) || typeof state.nextId !== 'number') return;
      bosses = state.bosses.map(function(b) {
        return {
          id: Number(b.id),
          name: String(b.name || ''),
          location: String(b.location || ''),
          respawnSeconds: Number(b.respawnSeconds || 0),
          killedAt: b.killedAt === null ? null : Number(b.killedAt),
          emoji: String(b.emoji || '🐉'),
        };
      });
      nextId = Number(state.nextId);
      render();
    },
    deleteBoss: function(id) {
      bosses = bosses.filter(function(b) { return b.id !== id; });
      render();
    },
  };

  // Init
  render();

  // Ask for notification permission on load
  if (Notification.permission === 'default') {
    setTimeout(() => Notification.requestPermission(), 2000);
  }
</script>
</body>
</html>
